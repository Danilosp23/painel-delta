<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
        }
        /* Aqui você coloca o link da sua imagem de fundo */
        .qg-container {
            width: 1000px;
            height: 560px;
            background-image: url('LINK_DA_SUA_IMAGEM_AQUI');
            background-size: cover;
            position: relative;
        }
        .btn-overlay {
            position: absolute;
            background: transparent;
            border: 2px solid transparent;
            cursor: pointer;
            /* Ajuste essas posições conforme a imagem */
            width: 280px;
            height: 80px;
        }
        .btn-overlay:hover { border: 2px solid #ff9900; }
    </style>
</head>
<body>

<div class="qg-container">
    <button class="btn-overlay" style="top: 200px; left: 60px;" onclick="alert('Visualizar Membros')"></button>
    <button class="btn-overlay" style="top: 200px; left: 360px;" onclick="alert('Dados de Treino')"></button>
</div>

</body>
</html>
