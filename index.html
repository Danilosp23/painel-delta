<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>QG 么Delta - Painel de Comando</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Área que contém a imagem */
        .qg-container {
            width: 1000px; height: 560px;
            background-image: url('https://raw.githubusercontent.com/Danilosp23/painel-delta/main/15c1d612-e331-4946-b075-ff8640e2d50d.png');
            background-size: contain; background-repeat: no-repeat;
            position: relative;
        }

        /* Área de Login que fica sobre a imagem */
        #loginArea { position: absolute; top: 200px; left: 350px; background: rgba(0,0,0,0.8); padding: 20px; border: 1px solid #ff9900; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="qg-container">
    <div id="loginArea">
        <h3>Autenticação Tática</h3>
        <input type="password" id="senhaAcesso" placeholder="Senha">
        <button onclick="verificarPatente()">LOGAR</button>
    </div>
</div>

<script>
    function verificarPatente() {
        const senha = document.getElementById("senhaAcesso").value;
        // Coloque suas senhas aqui
        const autorizados = ["Radical2026", "Daredevil2026", "NaLapa2026", "Zabu2026", "Cyber2026"];
        
        if (autorizados.includes(senha)) {
            alert("Acesso Autorizado.");
            document.getElementById("loginArea").classList.add("hidden");
        } else {
            alert("Acesso Negado!");
        }
    }
</script>
</body>
</html>
